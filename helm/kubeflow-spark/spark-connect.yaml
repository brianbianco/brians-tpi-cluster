apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-default-sa-spark-role
  namespace: spark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-operator-spark
subjects:
  - kind: ServiceAccount
    name: default
    namespace: spark
---
apiVersion: sparkoperator.k8s.io/v1alpha1
kind: SparkConnect
metadata:
  name: spark-connect
  namespace: spark
spec:
  image: apache/spark:4.1.1
  sparkVersion: "4.1.1"
  server:
    cores: 1
    memory: "1g"
    template:
      spec:
        serviceAccountName: spark-operator-spark
        containers:
          - name: spark-kubernetes-driver
            envFrom:
              - secretRef:
                  name: garage-s3-credentials
  executor:
    cores: 1
    memory: "1g"
    template:
      spec:
        containers:
          - name: spark-kubernetes-executor
            envFrom:
              - secretRef:
                  name: garage-s3-credentials
  sparkConf:
    spark.jars.packages: "org.apache.spark:spark-connect_2.13:4.1.1,org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.4.0"
    spark.driver.extraJavaOptions: "-Divy.home=/tmp/.ivy2"
    spark.kubernetes.authenticate.driver.serviceAccountName: "spark-operator-spark"
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.hadoop.fs.s3a.endpoint: "http://garage.garage.svc.cluster.local:3900"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
  dynamicAllocation:
    enabled: true
    minExecutors: 0
    maxExecutors: 4
    shuffleTrackingEnabled: true
