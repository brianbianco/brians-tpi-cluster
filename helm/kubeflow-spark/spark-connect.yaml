apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-default-sa-spark-role
  namespace: spark
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-operator-spark
subjects:
  - kind: ServiceAccount
    name: default
    namespace: spark
---
apiVersion: sparkoperator.k8s.io/v1alpha1
kind: SparkConnect
metadata:
  name: spark-connect
  namespace: spark
spec:
  image: apache/spark:4.1.1
  sparkVersion: "4.1.1"
  server:
    cores: 1
    memory: "1g"
    template:
      spec:
        serviceAccountName: spark-operator-spark
        containers:
          - name: spark-kubernetes-driver
            envFrom:
              - secretRef:
                  name: spark-s3-credentials
              - secretRef:
                  name: polaris-credentials
            env:
              - name: AWS_REGION
                value: garage
              - name: AWS_ENDPOINT_URL_S3
                value: http://garage.garage.svc.cluster.local:3900
  executor:
    cores: 1
    memory: "1g"
    template:
      spec:
        containers:
          - name: spark-kubernetes-executor
            envFrom:
              - secretRef:
                  name: spark-s3-credentials
              - secretRef:
                  name: polaris-credentials
            env:
              - name: AWS_REGION
                value: garage
              - name: AWS_ENDPOINT_URL_S3
                value: http://garage.garage.svc.cluster.local:3900
  sparkConf:
    spark.jars.packages: "org.apache.spark:spark-connect_2.13:4.1.1,org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.4.0"
    spark.driver.extraJavaOptions: "-Divy.home=/tmp/.ivy2"
    spark.kubernetes.authenticate.driver.serviceAccountName: "spark-operator-spark"
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.polaris: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.polaris.type: "rest"
    spark.sql.catalog.polaris.uri: "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
    spark.sql.catalog.polaris.credential: "root:root"
    spark.sql.catalog.polaris.warehouse: "POLARIS"
    spark.sql.catalog.polaris.scope: "PRINCIPAL_ROLE:ALL"
    spark.hadoop.fs.s3a.endpoint: "http://garage.garage.svc.cluster.local:3900"
    spark.hadoop.fs.s3a.endpoint.region: "garage"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    spark.sql.catalog.polaris.s3.endpoint: "http://garage.garage.svc.cluster.local:3900"
    spark.sql.catalog.polaris.s3.region: "garage"
    spark.sql.catalog.polaris.s3.path-style-access: "true"
    spark.ui.proxyBase: "/job/spark-connect"
  dynamicAllocation:
    enabled: true
    minExecutors: 0
    maxExecutors: 4
    shuffleTrackingEnabled: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-connect-ui-ingress
  namespace: spark
  annotations:
    external-dns.alpha.kubernetes.io/hostname: spark.brians.computer
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.pathmatcher: PathRegexp
    traefik.ingress.kubernetes.io/router.middlewares: spark-spark-strip-job-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: spark.brians.computer
      http:
        paths:
          - path: /job/spark-connect(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: spark-connect-server
                port:
                  number: 4040
  tls:
    - hosts:
        - spark.brians.computer
      secretName: spark-tls
---
# Catches bare Spark UI paths on HTTPS (e.g. /jobs/, /stages/) that Spark generates
# in its root redirect, and bounces the browser to the correct prefixed URL.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spark-connect-root-redirect-https
  namespace: spark
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`spark.brians.computer`) && !PathPrefix(`/job/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: spark-connect-rewrite-root
      services:
        - name: spark-connect-server
          port: 4040
  tls:
    secretName: spark-tls
---
# Same as above but for plain HTTP — Spark generates http:// Location headers so the
# browser follows the redirect over HTTP, requiring a separate route without TLS.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spark-connect-root-redirect-http
  namespace: spark
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`spark.brians.computer`) && !PathPrefix(`/job/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: spark-connect-rewrite-root
      services:
        - name: spark-connect-server
          port: 4040
