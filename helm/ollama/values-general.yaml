ollama:
  gpu:
    enabled: false
  models:
    pull:
      - qwen3:8b

persistentVolume:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 20Gi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: hardware
              operator: In
              values:
                - rk1

resources:
  requests:
    cpu: "2"
    memory: "6Gi"
  limits:
    cpu: "6"
    memory: "14Gi"

service:
  type: ClusterIP

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: ollama-general.brians.computer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: ollama-general.brians.computer
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ollama-general-tls
      hosts:
        - ollama-general.brians.computer
