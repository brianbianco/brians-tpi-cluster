kube-prometheus-stack:

  # ------------------------------------------------------------------ #
  # Default rule overrides
  #
  # CPUThrottlingHigh fires at 25% by default; GitLab regularly exceeds that
  # without real impact. Disable the built-in rule and re-add it at 66%.
  # ------------------------------------------------------------------ #
  defaultRules:
    disabled:
      CPUThrottlingHigh: true
      # marle.local runs Gitaly, Postgres, and Longhorn — heavy I/O workloads drive
      # up load average without the node actually being unresponsive. Override below.
      NodeSystemSaturation: true
      # Cluster nodes routinely run above 90% without impact. Override below at 93%/1h.
      NodeMemoryHighUtilization: true

  additionalPrometheusRulesMap:
    custom-thresholds:
      groups:
        - name: node-exporter-custom
          rules:
            - alert: NodeMemoryHighUtilization
              annotations:
                description: >
                  Memory is filling up at {{ $labels.instance }}, has been above 93% for the
                  last hour, is currently at {{ $value | humanizePercentage }}.
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememoryhighutilization
                summary: Host is running out of memory.
              expr: |-
                1 - (
                  node_memory_MemAvailable_bytes{job="node-exporter"}
                  / node_memory_MemTotal_bytes{job="node-exporter"}
                ) > 0.93
              for: 1h
              labels:
                severity: warning

            - alert: NodeSystemSaturation
              annotations:
                description: |
                  System load per core at {{ $labels.instance }} has been above 8 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
                  This might indicate this instance resources saturation and can cause it becoming unresponsive.
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
                summary: System saturated, load per core is very high.
              expr: |-
                node_load1{job="node-exporter"}
                / count without (cpu, mode) (node_cpu_seconds_total{job="node-exporter", mode="idle"}) > 8
              for: 15m
              labels:
                severity: warning

        - name: kubernetes-resources-custom
          rules:
            - alert: CPUThrottlingHigh
              annotations:
                description: '{{ $value | humanizePercentage }} throttling of CPU in namespace
                  {{ $labels.namespace }} for container {{ $labels.container }} in pod
                  {{ $labels.pod }} on cluster {{ $labels.cluster }}.'
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/cputhrottlinghigh
                summary: Processes experience elevated CPU throttling.
              expr: |-
                sum(increase(container_cpu_cfs_throttled_periods_total{container!="", job="kubelet", metrics_path="/metrics/cadvisor", }[5m])) without (id, metrics_path, name, image, endpoint, job, node)
                  / on (cluster, namespace, pod, container, instance) group_left
                sum(increase(container_cpu_cfs_periods_total{job="kubelet", metrics_path="/metrics/cadvisor", }[5m])) without (id, metrics_path, name, image, endpoint, job, node)
                  > ( 66 / 100 )
              for: 15m
              labels:
                severity: info

  # ------------------------------------------------------------------ #
  # k3s component monitors
  #
  # k3s runs controller-manager, scheduler, and kube-proxy as part of
  # its single binary rather than as discrete pods, so the default
  # ServiceMonitors for these components will never find targets.
  # Disable them to keep Prometheus alert-free. The kubelet and
  # kube-state-metrics monitors work fine.
  # ------------------------------------------------------------------ #
  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  # k3s embedded etcd binds port 2381 to localhost only on the control-plane
  # node, so Prometheus cannot reach it across the network. Disabled.
  kubeEtcd:
    enabled: false

  # ------------------------------------------------------------------ #
  # Prometheus
  # ------------------------------------------------------------------ #
  prometheus:
    prometheusSpec:
      retention: 14d
      retentionSize: "8GB"

      tsdb:
        outOfOrderTimeWindow: 10m

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2560Mi

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - magus.local
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - robo.local

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

      # Pick up ServiceMonitors, PodMonitors, Probes, and Rules from any namespace
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "prometheus.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - prometheus.brians.computer
      tls:
        - hosts:
            - prometheus.brians.computer
          secretName: prometheus-tls

  # ------------------------------------------------------------------ #
  # Alertmanager
  # ------------------------------------------------------------------ #
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

      # Mount the SMTP password secret so config can reference it via file.
      # Create the secret first:
      #   kubectl create secret generic alertmanager-email-secret --from-literal=smtp-password='your-gmail-app-password' -n monitoring
      secrets:
        - alertmanager-email-secret

    config:
      global:
        resolve_timeout: 5m
        smtp_smarthost: smtp.gmail.com:587
        smtp_from: brian.bianco@gmail.com
        smtp_auth_username: brian.bianco@gmail.com
        smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-email-secret/smtp-password
        smtp_require_tls: true

      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: email
        routes:
          # Silence watchdog (heartbeat alert used to verify alertmanager is running)
          - matchers:
              - alertname = Watchdog
            receiver: 'null'
          # InfoInhibitor is a meta-alert used to inhibit info-severity alerts when no
          # warning/critical is active. It should never reach a receiver.
          - matchers:
              - alertname = InfoInhibitor
            receiver: 'null'
          # magus (rk1) runs ollama inference and routinely sustains >90% CPU — visible
          # in Alertmanager but not worth an email.
          - matchers:
              - alertname = NodeCPUHighUsage
            receiver: 'null'
          # GitLab migration jobs complete successfully but kube-state-metrics
          # may still report them as failed; silence these false positives.
          - matchers:
              - namespace = gitlab
              - alertname =~ "KubeJobFailed|KubeJobNotCompleted"
            receiver: 'null'
          # GitLab HPAs routinely run at max replicas without service impact.
          - matchers:
              - namespace = gitlab
              - alertname = KubeHpaMaxedOut
            receiver: 'null'
          # GitLab pods restart during updates and on startup; route to email
          # but suppress repeats for 24h so a single event doesn't spam.
          - matchers:
              - namespace = gitlab
            receiver: email
            repeat_interval: 24h

      receivers:
        - name: email
          email_configs:
            - to: brian.bianco@gmail.com
              send_resolved: true
        - name: 'null'

      inhibit_rules:
        - source_matchers:
            - 'severity = critical'
          target_matchers:
            - 'severity = warning'
          equal: ['alertname', 'namespace']

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "alertmanager.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - alertmanager.brians.computer
      tls:
        - hosts:
            - alertmanager.brians.computer
          secretName: alertmanager-tls

  # ------------------------------------------------------------------ #
  # Grafana
  # ------------------------------------------------------------------ #
  grafana:
    deploymentStrategy:
      type: Recreate

    adminPassword: ""          # set via grafana-secret below
    admin:
      existingSecret: grafana-secret
      userKey: admin-user
      passwordKey: admin-password

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi

    persistence:
      enabled: true
      storageClassName: longhorn
      size: 2Gi

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "grafana.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - grafana.brians.computer
      tls:
        - hosts:
            - grafana.brians.computer
          secretName: grafana-tls

    plugins:
      - yesoreyeram-infinity-datasource

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        # grafana.com/dashboards/7587 — HTTP uptime (blackbox exporter)
        blackbox-exporter:
          gnetId: 7587
          revision: 3
          datasource: Prometheus
        # grafana.com/dashboards/1860 — per-node CPU, memory, disk, temp
        node-exporter-full:
          gnetId: 1860
          revision: 36
          datasource: Prometheus
        # grafana.com/dashboards/16888 — Longhorn volume health and disk usage
        longhorn:
          gnetId: 16888
          revision: 9
          datasource: Prometheus
        # grafana.com/dashboards/17347 — Traefik request rates and error rates
        traefik:
          gnetId: 17347
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        # grafana.com/dashboards/20417 — CloudNativePG cluster overview
        postgresql:
          gnetId: 20417
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

    # Loki datasource — becomes active once loki is deployed in the monitoring namespace
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false

  # ------------------------------------------------------------------ #
  # node-exporter
  # Tolerate all nodes including control-plane so every node is scraped
  # ------------------------------------------------------------------ #
  prometheus-node-exporter:
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

  # ------------------------------------------------------------------ #
  # kube-state-metrics
  # ------------------------------------------------------------------ #
  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

# ------------------------------------------------------------------ #
# Blackbox Exporter
# Probes HTTP endpoints and reports up/down to Prometheus.
# Probe targets are defined as Probe CRDs in manifests/blackbox-probes.yaml
# ------------------------------------------------------------------ #
prometheus-blackbox-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

  config:
    modules:
      # Follows redirects to login pages; expects final 2xx — good for web UIs
      http_2xx_follow:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          follow_redirects: true
          preferred_ip_protocol: "ip4"

      # Does not follow redirects; accepts 2xx/3xx/4xx — good for API endpoints
      # that return 403/401 for unauthenticated requests (e.g. S3 API)
      http_reachable:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: [200, 201, 202, 204, 301, 302, 303, 307, 308, 401, 403]
          follow_redirects: false
          preferred_ip_protocol: "ip4"
