kube-prometheus-stack:

  # ------------------------------------------------------------------ #
  # k3s component monitors
  #
  # k3s runs controller-manager, scheduler, and kube-proxy as part of
  # its single binary rather than as discrete pods, so the default
  # ServiceMonitors for these components will never find targets.
  # Disable them to keep Prometheus alert-free. The kubelet and
  # kube-state-metrics monitors work fine.
  # ------------------------------------------------------------------ #
  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeProxy:
    enabled: false

  # k3s embedded etcd binds port 2381 to localhost only on the control-plane
  # node, so Prometheus cannot reach it across the network. Disabled.
  kubeEtcd:
    enabled: false

  # ------------------------------------------------------------------ #
  # Prometheus
  # ------------------------------------------------------------------ #
  prometheus:
    prometheusSpec:
      retention: 14d
      retentionSize: "8GB"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 768Mi

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - magus.local
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - robo.local

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

      # Pick up ServiceMonitors, PodMonitors, Probes, and Rules from any namespace
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "prometheus.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - prometheus.brians.computer
      tls:
        - hosts:
            - prometheus.brians.computer
          secretName: prometheus-tls

  # ------------------------------------------------------------------ #
  # Alertmanager
  # ------------------------------------------------------------------ #
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "alertmanager.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - alertmanager.brians.computer
      tls:
        - hosts:
            - alertmanager.brians.computer
          secretName: alertmanager-tls

  # ------------------------------------------------------------------ #
  # Grafana
  # ------------------------------------------------------------------ #
  grafana:
    deploymentStrategy:
      type: Recreate

    adminPassword: ""          # set via grafana-secret below
    admin:
      existingSecret: grafana-secret
      userKey: admin-user
      passwordKey: admin-password

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    persistence:
      enabled: true
      storageClassName: longhorn
      size: 2Gi

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: "grafana.brians.computer"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - grafana.brians.computer
      tls:
        - hosts:
            - grafana.brians.computer
          secretName: grafana-tls

    # Blackbox Exporter uptime dashboard (grafana.com/dashboards/7587)
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        blackbox-exporter:
          gnetId: 7587
          revision: 3
          datasource: Prometheus

    # Pre-load the Loki datasource so it's ready when you add Loki later
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local
        access: proxy
        isDefault: false

  # ------------------------------------------------------------------ #
  # node-exporter
  # Tolerate all nodes including control-plane so every node is scraped
  # ------------------------------------------------------------------ #
  prometheus-node-exporter:
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

  # ------------------------------------------------------------------ #
  # kube-state-metrics
  # ------------------------------------------------------------------ #
  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

# ------------------------------------------------------------------ #
# Blackbox Exporter
# Probes HTTP endpoints and reports up/down to Prometheus.
# Probe targets are defined as Probe CRDs in manifests/blackbox-probes.yaml
# ------------------------------------------------------------------ #
prometheus-blackbox-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

  config:
    modules:
      # Follows redirects to login pages; expects final 2xx — good for web UIs
      http_2xx_follow:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          follow_redirects: true
          preferred_ip_protocol: "ip4"

      # Does not follow redirects; accepts 2xx/3xx/4xx — good for API endpoints
      # that return 403/401 for unauthenticated requests (e.g. S3 API)
      http_reachable:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: [200, 201, 202, 204, 301, 302, 303, 307, 308, 401, 403]
          follow_redirects: false
          preferred_ip_protocol: "ip4"
