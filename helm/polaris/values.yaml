replicaCount: 1

image:
  repository: apache/polaris
  tag: "1.3.0-incubating"
  pullPolicy: IfNotPresent

features:
  SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION: true

extraEnv:
  - name: AWS_REGION
    value: garage
  - name: AWS_ENDPOINT_URL_S3
    value: http://garage.garage.svc.cluster.local:3900
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: polaris-s3-credentials
        key: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: polaris-s3-credentials
        key: AWS_SECRET_ACCESS_KEY
  - name: AWS_REQUEST_CHECKSUM_CALCULATION
    value: when_required
  - name: AWS_RESPONSE_CHECKSUM_VALIDATION
    value: when_required

persistence:
  type: relational-jdbc
  relationalJdbc:
    secret:
      name: polaris-db-secret
      jdbcUrl: jdbcUrl
      username: username
      password: password

authentication:
  type: internal
  tokenBroker:
    type: rsa-key-pair
    maxTokenGeneration: PT1H

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: polaris.brians.computer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: polaris.brians.computer
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: polaris-tls
      hosts:
        - polaris.brians.computer

service:
  type: ClusterIP
  ports:
    - name: polaris-http
      port: 8181

logging:
  level: INFO
  console:
    enabled: true
    json: false
  file:
    enabled: false

metrics:
  enabled: true

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "1Gi"
