apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 1

  storage:
    storageClass: longhorn
    size: 30Gi

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: app-user

  # enablePodMonitor is deprecated in CNPG 1.29+.
  # The PodMonitor is managed manually in manifests/podmonitor-postgres.yaml.
  monitoring:
    enablePodMonitor: false

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"

