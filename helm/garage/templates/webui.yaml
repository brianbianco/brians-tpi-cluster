apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: garage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garage-webui
  template:
    metadata:
      labels:
        app: garage-webui
    spec:
      containers:
        - name: garage-webui
          image: khairul169/garage-webui:1.1.0
          ports:
            - containerPort: 3909
          env:
            - name: API_BASE_URL
              value: http://garage-admin.garage.svc.cluster.local:3903
            - name: API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-admin-secret
                  key: token
            - name: S3_ENDPOINT_URL
              value: http://garage.garage.svc.cluster.local:3900
          volumeMounts:
            - name: garage-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
      volumes:
        - name: garage-config
          configMap:
            name: garage-config
---
apiVersion: v1
kind: Service
metadata:
  name: garage-webui
  namespace: garage
spec:
  type: ClusterIP
  selector:
    app: garage-webui
  ports:
    - port: 3909
      targetPort: 3909
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: garage-webui
  namespace: garage
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "garage-ui.brians.computer"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - secretName: garage-webui-tls
      hosts:
        - garage-ui.brians.computer
  rules:
    - host: garage-ui.brians.computer
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: garage-webui
                port:
                  number: 3909
