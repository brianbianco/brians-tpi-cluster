server:
  image:
    repository: unitycatalog/unitycatalog
    pullPolicy: Always

  # Postgres backend — uses the existing CloudNativePG cluster
  db:
    type: postgresql
    postgresqlConfig:
      host: postgres-rw.postgres.svc.cluster.local
      port: 5432
      dbName: unitycatalog
      username: unitycatalog
      passwordSecretName: unitycatalog-postgres-secret
      passwordSecretKey: password

  # Table data stored on Longhorn PVC (Unity Catalog helm chart does not support
  # custom S3 endpoints, so Garage cannot be used here)
  modelStorageRoot: "file:/tmp/ucroot"

ui:
  image:
    repository: unitycatalog/unitycatalog-ui
    pullPolicy: Always

# Single ingress — / routes to UI, /api routes to server
ingress:
  enabled: true
  host: unitycatalog.brians.computer
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: unitycatalog.brians.computer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  tlsSecretName: unitycatalog-tls
